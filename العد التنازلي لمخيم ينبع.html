<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العد التنازلي - برنامج رحال 5</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- خط تجوال -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet">

    <!-- أيقونات Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0b1120;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- خلفية متموجة متقدمة --- */
        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(180deg, #0f172a 0%, #0e4b5a 40%, #0f172a 100%);
            overflow: hidden;
        }

        .aurora-bg::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 50% 50%, rgba(45, 212, 191, 0.15), transparent 60%);
            animation: pulse-glow 8s ease-in-out infinite alternate;
        }

        .wave {
            position: absolute;
            width: 200%;
            height: 200%;
            opacity: 0.4;
            left: -50%;
            top: -50%;
            border-radius: 40%;
            background: rgba(20, 184, 166, 0.1);
            animation: rotate 20s linear infinite;
        }

        .wave:nth-child(2) {
            top: -55%;
            left: -55%;
            background: rgba(56, 189, 248, 0.1);
            animation: rotate 25s linear infinite reverse;
        }

        .wave:nth-child(3) {
            top: -60%;
            left: -60%;
            background: rgba(99, 102, 241, 0.08);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse-glow {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.1); }
        }

        /* --- بطاقات العد التنازلي --- */
        .countdown-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            aspect-ratio: 3/5; /* شكل طولي مثل التصميم */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .countdown-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(45, 212, 191, 0.5), transparent);
        }

        .countdown-card:hover {
            transform: translateY(-5px);
            border-color: rgba(45, 212, 191, 0.4);
            box-shadow: 0 10px 40px -10px rgba(45, 212, 191, 0.2);
        }

        /* تأثير النص الرقمي */
        .digit-text {
            font-family: 'Tajawal', sans-serif; /* أو خط رقمي إذا توفر */
            background: linear-gradient(180deg, #fff 20%, rgba(255, 255, 255, 0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        /* عناصر واجهة المستخدم */
        .glass-pill {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(45, 212, 191, 0.3);
            backdrop-filter: blur(8px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #14b8a6 0%, #0f766e 100%);
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        
        .btn-primary:hover::after {
            left: 100%;
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }
        
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen relative px-4 py-8">

    <!-- الخلفية المتحركة -->
    <div class="aurora-bg">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <!-- المحتوى الرئيسي -->
    <main class="relative z-10 w-full max-w-5xl flex flex-col items-center gap-8 md:gap-12">
        
        <!-- رأس الصفحة والشعار -->
        <header class="flex flex-col items-center animate-fade-in-down">
            <div class="relative group cursor-default">
                <!-- تأثير توهج خلف الشعار -->
                <div class="absolute -inset-4 bg-teal-500/20 rounded-full blur-2xl group-hover:bg-teal-500/30 transition-all duration-500"></div>
                <img src="https://i.postimg.cc/W3RspRfy/hwyt-rhal-05.png" alt="شعار رحال" class="relative w-48 md:w-64 drop-shadow-2xl transform group-hover:scale-105 transition-transform duration-500">
            </div>
            
            <!-- كبسولة الموقع -->
            <div class="mt-8 glass-pill px-6 py-2 rounded-full flex items-center gap-3 text-teal-100 shadow-lg hover:border-teal-400/50 transition-colors">
                <i data-lucide="map-pin" class="w-5 h-5 text-teal-400"></i>
                <span class="text-lg font-medium tracking-wide">مخيم ينبع - رقم ٢٩</span>
            </div>
        </header>

        <!-- شبكة العد التنازلي -->
        <div id="countdown-container" class="grid grid-cols-4 gap-3 md:gap-6 w-full max-w-3xl mx-auto">
            <!-- ثواني -->
            <div class="countdown-card group">
                <div class="h-full flex flex-col items-center justify-between py-6 w-full">
                    <span class="text-teal-300 text-sm md:text-lg font-medium tracking-wider uppercase opacity-80">ثانية</span>
                    <span id="seconds" class="digit-text text-4xl md:text-7xl font-bold tabular-nums">00</span>
                    <div class="w-1 h-1 rounded-full bg-teal-500/50 group-hover:bg-teal-400 shadow-[0_0_10px_rgba(20,184,166,0.8)] transition-colors"></div>
                </div>
            </div>

            <!-- دقائق -->
            <div class="countdown-card group">
                <div class="h-full flex flex-col items-center justify-between py-6 w-full">
                    <span class="text-blue-300 text-sm md:text-lg font-medium tracking-wider uppercase opacity-80">دقيقة</span>
                    <span id="minutes" class="digit-text text-4xl md:text-7xl font-bold tabular-nums">00</span>
                    <div class="w-1 h-1 rounded-full bg-blue-500/50 group-hover:bg-blue-400 shadow-[0_0_10px_rgba(59,130,246,0.8)] transition-colors"></div>
                </div>
            </div>

            <!-- ساعات -->
            <div class="countdown-card group">
                <div class="h-full flex flex-col items-center justify-between py-6 w-full">
                    <span class="text-indigo-300 text-sm md:text-lg font-medium tracking-wider uppercase opacity-80">ساعة</span>
                    <span id="hours" class="digit-text text-4xl md:text-7xl font-bold tabular-nums">00</span>
                    <div class="w-1 h-1 rounded-full bg-indigo-500/50 group-hover:bg-indigo-400 shadow-[0_0_10px_rgba(99,102,241,0.8)] transition-colors"></div>
                </div>
            </div>

             <!-- أيام -->
             <div class="countdown-card group">
                <div class="h-full flex flex-col items-center justify-between py-6 w-full">
                    <span class="text-teal-100 text-sm md:text-lg font-medium tracking-wider uppercase opacity-80">يوم</span>
                    <span id="days" class="digit-text text-4xl md:text-7xl font-bold tabular-nums">00</span>
                    <div class="w-1 h-1 rounded-full bg-white/30 group-hover:bg-white shadow-[0_0_10px_rgba(255,255,255,0.5)] transition-colors"></div>
                </div>
            </div>
        </div>

        <!-- معلومات الانطلاق -->
        <div id="status-container" class="glass-pill px-8 py-4 rounded-2xl flex flex-col md:flex-row items-center gap-3 md:gap-6 border-teal-500/20">
            <div class="flex items-center gap-3 text-gray-200">
                <div class="bg-teal-500/10 p-2 rounded-lg border border-teal-500/20">
                    <i data-lucide="calendar-clock" class="w-6 h-6 text-teal-400"></i>
                </div>
                <div class="flex flex-col text-right">
                    <span class="text-xs text-teal-300/70 font-bold uppercase tracking-wider">تاريخ الانطلاق</span>
                    <span class="text-lg font-bold">الخميس القادم، الساعة ٤:٠٠ م</span>
                </div>
            </div>
        </div>

        <!-- الأزرار -->
        <div class="flex flex-wrap justify-center gap-4 w-full mt-2">
            <a href="https://maps.app.goo.gl/ESkaWFwSVEv5Vbpn9" target="_blank" class="btn-primary px-10 py-3 rounded-xl flex items-center gap-3 shadow-lg shadow-teal-900/50 hover:shadow-teal-500/20 hover:-translate-y-1 transition-all">
                <i data-lucide="map-pin" class="w-5 h-5 text-white"></i>
                <span class="font-bold text-white text-lg">موقع التجمع</span>
            </a>
        </div>

    </main>

    <script>
        // تهيئة الأيقونات
        lucide.createIcons();

        // تحديد التاريخ المستهدف: 20 نوفمبر 2025 الساعة 16:00 (الرابعة عصراً)
        const targetDate = new Date('2025-11-20T16:00:00').getTime();

        const daysEl = document.getElementById('days');
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');
        const container = document.getElementById('countdown-container');
        const statusContainer = document.getElementById('status-container');

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                clearInterval(interval);
                // حالة انتهاء العد
                container.innerHTML = `
                    <div class="col-span-4 flex flex-col items-center justify-center py-12 animate-bounce">
                        <h2 class="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-300 to-blue-300 mb-4">
                            انطلقنا!
                        </h2>
                        <p class="text-xl text-teal-100/80">نتمنى لكم رحلة ممتعة وآمنة في ينبع</p>
                    </div>
                `;
                statusContainer.style.display = 'none';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // تحديث الأرقام مع إضافة صفر إذا كان الرقم أقل من 10
            daysEl.innerText = days < 10 ? '0' + days : days;
            hoursEl.innerText = hours < 10 ? '0' + hours : hours;
            minutesEl.innerText = minutes < 10 ? '0' + minutes : minutes;
            secondsEl.innerText = seconds < 10 ? '0' + seconds : seconds;
        }

        const interval = setInterval(updateCountdown, 1000);
        updateCountdown();

        // دالة المشاركة باستخدام Web Share API إذا توفرت، أو النسخ للحافظة
        async function shareApp() {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'برنامج رحال - الموسم الخامس',
                        text: 'تابع العد التنازلي لانطلاق مخيم ينبع - برنامج رحال!',
                        url: window.location.href,
                    });
                } catch (err) {
                    console.log('Error sharing:', err);
                }
            } else {
                // Fallback: Copy to clipboard
                const dummy = document.createElement('input');
                document.body.appendChild(dummy);
                dummy.value = window.location.href;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
                
                const btnText = document.querySelector('button span');
                const originalText = btnText.innerText;
                btnText.innerText = "تم نسخ الرابط!";
                setTimeout(() => btnText.innerText = originalText, 2000);
            }
        }
    </script>
</body>
</html>
